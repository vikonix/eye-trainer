<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye Trainer</title>
<style>
  :root {
    --bg: #0d0f14;
    --dot: #ffd45e;
    --dot-glow: rgba(255, 212, 94, 0.35);
    --ui: rgba(255, 255, 255, 0.75);
    --ui-bg: rgba(20, 24, 32, 0.85);
    --ui-border: rgba(255, 255, 255, 0.12);
    --accent: #ffd45e;
  }
  html.light {
    --bg: #f2f0e9;
    --dot: #2c2f38;
    --dot-glow: rgba(44, 47, 56, 0.25);
    --ui: rgba(20, 20, 20, 0.8);
    --ui-bg: rgba(255, 255, 255, 0.85);
    --ui-border: rgba(0, 0, 0, 0.12);
    --accent: #c98a12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: background 0.4s ease;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  canvas { display: block; position: fixed; inset: 0; }

  /* Panel */
  .panel {
    position: fixed;
    top: 16px;
    left: 16px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--ui);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    width: 260px;
    font-size: 13px;
    transition: opacity 0.4s ease, transform 0.4s ease;
    z-index: 10;
  }
  .panel.hidden { opacity: 0; transform: translateY(-8px); pointer-events: none; }
  .panel h1 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: move;
    touch-action: none;
  }
  .panel h1 .mode-name { color: var(--accent); }
  .row { margin-bottom: 12px; }
  .row:last-child { margin-bottom: 0; }
  .row label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    opacity: 0.85;
  }
  .row label span:last-child { color: var(--accent); font-variant-numeric: tabular-nums; }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .modes { display: flex; flex-wrap: wrap; gap: 6px; }
  .modes button {
    flex: 1 1 auto;
    background: transparent;
    border: 1px solid var(--ui-border);
    color: var(--ui);
    border-radius: 8px;
    padding: 6px 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .modes button:hover { border-color: var(--accent); }
  .modes button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .toggles { display: flex; gap: 8px; }
  .toggles button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--ui-border);
    color: var(--ui);
    border-radius: 8px;
    padding: 7px 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .toggles button.on { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .toggles button:hover { border-color: var(--accent); }
  .hide-btn {
    width: 100%;
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--ui-border);
    color: var(--ui);
    border-radius: 8px;
    padding: 7px 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .hide-btn:hover { border-color: var(--accent); }
  .hint {
    margin-top: 10px;
    font-size: 10.5px;
    line-height: 1.6;
    opacity: 0.55;
  }
  .hint kbd {
    background: var(--ui-border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
  }
  .tip {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--ui);
    opacity: 0.4;
    font-size: 12px;
    z-index: 10;
    transition: opacity 0.4s ease;
  }
  .tip.hidden { opacity: 0; }
  .blink-flash {
    position: fixed;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 5;
  }
  .blink-flash.show { animation: blinkPulse 1s ease; }
  @keyframes blinkPulse {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.12; }
  }
  .blink-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--ui);
    font-size: 22px;
    font-weight: 600;
    opacity: 0;
    z-index: 6;
    pointer-events: none;
    letter-spacing: 1px;
  }
  .blink-text.show { animation: blinkText 1s ease; }
  @keyframes blinkText {
    0%, 100% { opacity: 0; }
    30%, 70% { opacity: 0.8; }
  }

  /* Respect reduced-motion: drop the full-screen colour pulse (the jarring part)
     but keep the text reminder so the blink prompt still works. */
  @media (prefers-reduced-motion: reduce) {
    .blink-flash.show { animation: none; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="blink-flash" id="flash"></div>
<div class="blink-text" id="blinkText">Blink 👁</div>

<div class="panel" id="panel">
  <h1>Eye Trainer · <span class="mode-name" id="modeName">—</span></h1>

  <div class="row">
    <div class="modes" id="modes"></div>
  </div>

  <div class="row">
    <label for="speed">Speed <span id="speedVal">1.0×</span></label>
    <input type="range" id="speed" min="0.3" max="3" step="0.1" value="1">
  </div>

  <div class="row">
    <label for="size">Dot size <span id="sizeVal">26 px</span></label>
    <input type="range" id="size" min="10" max="60" step="1" value="26">
  </div>

  <div class="row">
    <label for="auto">Auto-switch mode <span id="autoVal">off</span></label>
    <input type="range" id="auto" min="0" max="60" step="5" value="0">
  </div>

  <div class="row toggles">
    <button id="playBtn" class="on">⏸ Pause</button>
    <button id="themeBtn">🌙 Theme</button>
    <button id="blinkBtn" class="on">👁 Blink</button>
  </div>

  <div class="hint">
    <kbd>Space</kbd> pause · <kbd>←</kbd><kbd>→</kbd> mode · <kbd>↑</kbd><kbd>↓</kbd> speed<br>
    <kbd>T</kbd> theme · <kbd>A</kbd> auto-switch · <kbd>H</kbd> hide panel · <kbd>F</kbd> fullscreen<br>
    Drag the title bar to move this panel
  </div>

  <button id="hideBtn" class="hide-btn">✕ Hide panel</button>
</div>

<div class="tip" id="tip">Press <b>H</b> to hide the panel · <b>F</b> for fullscreen</div>

<script>
"use strict";

// ---- Modes: each returns normalized position {x, y in 0..1, scale} for phase p in 0..1 ----
const TAU = Math.PI * 2;
const MODES = [
  {
    key: "Horizontal",
    // Left-right sweep with ease at the edges
    fn: (p) => ({ x: 0.5 + 0.5 * Math.sin(p * TAU), y: 0.5, scale: 1 }),
    period: 8, // seconds for a full cycle at speed 1
  },
  {
    key: "Vertical",
    fn: (p) => ({ x: 0.5, y: 0.5 + 0.5 * Math.sin(p * TAU), scale: 1 }),
    period: 8,
  },
  {
    key: "Diagonals",
    // Two diagonals between the top-center and the two bottom corners (a V shape)
    fn: (p) => {
      const s = Math.sin(p * TAU);
      return { x: 0.5 + 0.5 * s, y: Math.abs(s), scale: 1 };
    },
    period: 10,
  },
  {
    key: "Circle CW",
    // Clockwise on screen: right -> bottom -> left -> top
    fn: (p) => ({ x: 0.5 + 0.5 * Math.cos(p * TAU), y: 0.5 + 0.5 * Math.sin(p * TAU), scale: 1 }),
    period: 9,
  },
  {
    key: "Circle CCW",
    // Counter-clockwise: reverse the vertical component
    fn: (p) => ({ x: 0.5 + 0.5 * Math.cos(p * TAU), y: 0.5 - 0.5 * Math.sin(p * TAU), scale: 1 }),
    period: 9,
  },
  {
    key: "Figure-8 H",
    // Horizontal lemniscate of Gerono: figure-eight (∞)
    fn: (p) => {
      const t = p * TAU;
      return { x: 0.5 + 0.46 * Math.sin(t), y: 0.5 + 0.30 * Math.sin(t) * Math.cos(t), scale: 1 };
    },
    period: 11,
  },
  {
    key: "Figure-8 V",
    // Vertical figure-eight: axes swapped so the loops stack vertically (8)
    fn: (p) => {
      const t = p * TAU;
      return { x: 0.5 + 0.30 * Math.sin(t) * Math.cos(t), y: 0.5 + 0.46 * Math.sin(t), scale: 1 };
    },
    period: 11,
  },
  {
    key: "Saccades",
    // Jumps between random targets, holding still between jumps
    fn: (p, ctx) => {
      const steps = 6;               // targets per cycle
      const idx = Math.floor(p * steps);
      if (idx !== ctx.sacIdx) {
        ctx.sacIdx = idx;
        ctx.sacX = 0.1 + Math.random() * 0.8;
        ctx.sacY = 0.15 + Math.random() * 0.7;
      }
      return { x: ctx.sacX, y: ctx.sacY, scale: 1, smooth: true };
    },
    period: 12,
  },
  {
    key: "Zoom",
    // Accommodation: circle grows and shrinks in place
    fn: (p) => {
      const s = 0.5 - 0.5 * Math.cos(p * TAU); // 0..1..0
      return { x: 0.5, y: 0.5, scale: 0.5 + s * 3.5 };
    },
    period: 9,
  },
];

// ---- State ----
const state = {
  modeIdx: 0,
  playing: true,
  speed: 1,
  baseSize: 26,
  autoSec: 0,          // 0 = off
  blink: true,
  phase: 0,            // 0..1 within current mode
  lastTs: null,
  autoTimer: 0,        // seconds since last auto-switch
  blinkTimer: 0,       // seconds since last blink reminder
  ctx: {},             // scratch for modes (saccades)
  // smoothed screen position for saccade easing
  curX: 0.5, curY: 0.5, curScale: 1,
  dirty: true,         // force a repaint even while paused (UI/layout changed)
};

const canvas = document.getElementById("c");
const g = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;

// Cached theme colors: reading getComputedStyle every frame forces a style
// recalc 60x/s, so we resolve the CSS variables once and refresh on theme change.
const colors = { dot: "", glow: "", glowFade: "", bg: "" };
function refreshColors() {
  const style = getComputedStyle(document.documentElement);
  colors.dot = style.getPropertyValue("--dot").trim();
  colors.glow = style.getPropertyValue("--dot-glow").trim();
  colors.bg = style.getPropertyValue("--bg").trim();
  // Fully transparent variant of the glow colour. Fading a gradient to the
  // keyword "transparent" interpolates through transparent-black and leaves a
  // dark halo in some browsers, so we fade to the same RGB at zero alpha instead.
  colors.glowFade = colors.glow.replace(/[\d.]+\s*\)\s*$/, "0)");
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  g.setTransform(DPR, 0, 0, DPR, 0, 0);
  state.dirty = true; // resizing clears the canvas, so a repaint is needed
}
window.addEventListener("resize", resize);
resize();

// ---- UI wiring ----
const modesEl = document.getElementById("modes");
MODES.forEach((m, i) => {
  const b = document.createElement("button");
  b.textContent = m.key;
  b.onclick = () => setMode(i);
  modesEl.appendChild(b);
});
const modeBtns = () => Array.from(modesEl.children);

const el = (id) => document.getElementById(id);
const modeNameEl = el("modeName");
const speedInput = el("speed"), speedVal = el("speedVal");
const sizeInput = el("size"), sizeVal = el("sizeVal");
const autoInput = el("auto"), autoVal = el("autoVal");
const playBtn = el("playBtn"), themeBtn = el("themeBtn"), blinkBtn = el("blinkBtn");
const panel = el("panel"), tip = el("tip");
const flash = el("flash"), blinkText = el("blinkText");

// ---- Settings persistence (localStorage) ----
const SETTINGS_KEY = "eye-trainer-settings";

let saveTimer = 0;

// Debounced: slider `input` events fire rapidly, so batch writes instead of
// serializing to localStorage on every pixel of a drag.
function saveSettings() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(writeSettings, 300);
}

function writeSettings() {
  clearTimeout(saveTimer);
  // Persist only user-configurable settings, not transient runtime state
  const data = {
    modeIdx: state.modeIdx,
    speed: state.speed,
    baseSize: state.baseSize,
    autoSec: state.autoSec,
    blink: state.blink,
    light: document.documentElement.classList.contains("light"),
    panelX: parseFloat(panel.style.left),
    panelY: parseFloat(panel.style.top),
  };
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(data));
  } catch (e) {
    // Storage may be unavailable (private mode, disabled); ignore silently
  }
}

// Flush any pending write before the page goes away so nothing is lost.
window.addEventListener("pagehide", writeSettings);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") writeSettings();
});

function loadSettings() {
  let data;
  try {
    data = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");
  } catch (e) {
    data = null;
  }
  if (!data) return;

  if (Number.isInteger(data.modeIdx) && data.modeIdx >= 0 && data.modeIdx < MODES.length) {
    state.modeIdx = data.modeIdx;
  }
  if (typeof data.speed === "number") state.speed = data.speed;
  if (typeof data.baseSize === "number") state.baseSize = data.baseSize;
  if (typeof data.autoSec === "number") state.autoSec = data.autoSec;
  if (typeof data.blink === "boolean") state.blink = data.blink;
  if (data.light) document.documentElement.classList.add("light");
  if (typeof data.panelX === "number" && typeof data.panelY === "number") {
    positionPanel(data.panelX, data.panelY);
  }

  // Reflect restored values in the input controls
  speedInput.value = state.speed;
  sizeInput.value = state.baseSize;
  autoInput.value = state.autoSec;
}

function toggleTheme() {
  document.documentElement.classList.toggle("light");
  refreshColors();
  state.dirty = true;
  refreshUI(); // updates the theme button label and persists the change
}

function refreshUI() {
  modeNameEl.textContent = MODES[state.modeIdx].key;
  modeBtns().forEach((b, i) => b.classList.toggle("active", i === state.modeIdx));
  speedVal.textContent = state.speed.toFixed(1) + "×";
  sizeVal.textContent = state.baseSize + " px";
  autoVal.textContent = state.autoSec === 0 ? "off" : state.autoSec + " s";
  playBtn.textContent = state.playing ? "⏸ Pause" : "▶ Play";
  playBtn.classList.toggle("on", state.playing);
  blinkBtn.classList.toggle("on", state.blink);
  themeBtn.textContent = document.documentElement.classList.contains("light") ? "☀ Theme" : "🌙 Theme";
  saveSettings();
}

function setMode(i) {
  state.modeIdx = (i + MODES.length) % MODES.length;
  state.phase = 0;
  state.autoTimer = 0;
  state.ctx = {};
  state.dirty = true;
  refreshUI();
}

speedInput.oninput = () => { state.speed = parseFloat(speedInput.value); refreshUI(); };
sizeInput.oninput = () => { state.baseSize = parseInt(sizeInput.value); state.dirty = true; refreshUI(); };
autoInput.oninput = () => { state.autoSec = parseInt(autoInput.value); state.autoTimer = 0; refreshUI(); };
playBtn.onclick = () => { state.playing = !state.playing; refreshUI(); };
themeBtn.onclick = toggleTheme;
blinkBtn.onclick = () => { state.blink = !state.blink; state.blinkTimer = 0; refreshUI(); };

// ---- Keyboard ----
window.addEventListener("keydown", (e) => {
  // Let a focused range slider handle its own arrow keys instead of also
  // firing the global mode/speed shortcuts.
  if (e.target instanceof HTMLInputElement) return;
  switch (e.code) {
    case "Space": e.preventDefault(); state.playing = !state.playing; refreshUI(); break;
    case "ArrowRight": setMode(state.modeIdx + 1); break;
    case "ArrowLeft": setMode(state.modeIdx - 1); break;
    case "ArrowUp": e.preventDefault(); state.speed = Math.min(3, +(state.speed + 0.1).toFixed(1)); speedInput.value = state.speed; refreshUI(); break;
    case "ArrowDown": e.preventDefault(); state.speed = Math.max(0.3, +(state.speed - 0.1).toFixed(1)); speedInput.value = state.speed; refreshUI(); break;
    case "KeyT": toggleTheme(); break;
    case "KeyA":
      // cycle auto: off -> 15 -> 30 -> off
      state.autoSec = state.autoSec === 0 ? 15 : state.autoSec === 15 ? 30 : 0;
      autoInput.value = state.autoSec; state.autoTimer = 0; refreshUI(); break;
    case "KeyH": panel.classList.toggle("hidden"); tip.classList.add("hidden"); break;
    case "KeyF": toggleFullscreen(); break;
  }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen?.().catch(() => {});
  } else {
    document.exitFullscreen?.();
  }
}

// Hide the tip after a while
setTimeout(() => tip.classList.add("hidden"), 6000);

// ---- Animation loop ----
function frame(ts) {
  if (state.lastTs === null) state.lastTs = ts;
  let dt = (ts - state.lastTs) / 1000;
  state.lastTs = ts;
  if (dt > 0.1) dt = 0.1; // clamp after tab switch

  const mode = MODES[state.modeIdx];

  if (state.playing) {
    state.phase = (state.phase + dt / (mode.period / state.speed)) % 1;

    // Auto mode switch
    if (state.autoSec > 0) {
      state.autoTimer += dt;
      if (state.autoTimer >= state.autoSec) setMode(state.modeIdx + 1);
    }
    // Blink reminder every ~20 s
    if (state.blink) {
      state.blinkTimer += dt;
      if (state.blinkTimer >= 20) { state.blinkTimer = 0; triggerBlink(); }
    }
  }

  const raw = mode.fn(state.phase, state.ctx);
  const prevX = state.curX, prevY = state.curY, prevScale = state.curScale;

  // Only the discrete saccade jumps need easing; continuous paths are already
  // smooth, so we set them directly to avoid amplitude loss and lag (e.g. Zoom).
  if (raw.smooth) {
    // Frame-rate independent easing: a 0.28 factor tuned for 60 fps is remapped
    // through dt so the feel is identical on 60 Hz and 120 Hz displays.
    const k = 1 - Math.pow(1 - 0.28, dt * 60);
    state.curX += (raw.x - state.curX) * k;
    state.curY += (raw.y - state.curY) * k;
    state.curScale += (raw.scale - state.curScale) * k;
  } else {
    state.curX = raw.x;
    state.curY = raw.y;
    state.curScale = raw.scale;
  }

  // While paused, repaint only if something actually changed: either the dot is
  // still easing into place, or a UI/layout change set the dirty flag.
  const EPS = 1e-4;
  const moved = Math.abs(state.curX - prevX) > EPS ||
                Math.abs(state.curY - prevY) > EPS ||
                Math.abs(state.curScale - prevScale) > EPS;

  if (state.playing || moved || state.dirty) {
    draw(state.curX, state.curY, state.curScale);
    state.dirty = false;
  }
  requestAnimationFrame(frame);
}

function draw(nx, ny, scale) {
  g.clearRect(0, 0, W, H);

  // Keep the dot one base-radius away from the edges so it never clips. Modes
  // that scale up (Zoom) stay centred, so they don't clip despite the larger radius.
  const margin = state.baseSize;
  const x = margin + nx * (W - margin * 2);
  const y = margin + ny * (H - margin * 2);
  const r = state.baseSize * scale;

  // Glow
  const grad = g.createRadialGradient(x, y, 0, x, y, r * 2.6);
  grad.addColorStop(0, colors.glow);
  grad.addColorStop(1, colors.glowFade);
  g.fillStyle = grad;
  g.beginPath();
  g.arc(x, y, r * 2.6, 0, TAU);
  g.fill();

  // Core dot
  g.fillStyle = colors.dot;
  g.beginPath();
  g.arc(x, y, r, 0, TAU);
  g.fill();

  // Tiny fixation center to aid focus
  g.fillStyle = colors.bg;
  g.beginPath();
  g.arc(x, y, Math.max(1.5, r * 0.14), 0, TAU);
  g.fill();
}

function triggerBlink() {
  flash.classList.remove("show");
  blinkText.classList.remove("show");
  // reflow to restart animation
  void flash.offsetWidth;
  flash.classList.add("show");
  blinkText.classList.add("show");
}

// ---- Draggable panel (drag by the title bar) ----
const panelHeader = panel.querySelector("h1");
let drag = null;

// Clamp the panel inside the viewport, then apply the position
function positionPanel(x, y) {
  const maxX = window.innerWidth - panel.offsetWidth;
  const maxY = window.innerHeight - panel.offsetHeight;
  panel.style.left = Math.max(0, Math.min(x, maxX)) + "px";
  panel.style.top = Math.max(0, Math.min(y, maxY)) + "px";
}

panelHeader.addEventListener("pointerdown", (e) => {
  const rect = panel.getBoundingClientRect();
  drag = { dx: e.clientX - rect.left, dy: e.clientY - rect.top };
  panelHeader.setPointerCapture(e.pointerId);
  e.preventDefault();
});
panelHeader.addEventListener("pointermove", (e) => {
  if (drag) positionPanel(e.clientX - drag.dx, e.clientY - drag.dy);
});
panelHeader.addEventListener("pointerup", (e) => {
  if (!drag) return;
  drag = null;
  panelHeader.releasePointerCapture(e.pointerId);
  saveSettings();
});

// Hide button
el("hideBtn").onclick = () => { panel.classList.add("hidden"); tip.classList.add("hidden"); };

// Tap anywhere to toggle panel (useful on touch/fullscreen). Delayed so a
// double-click (fullscreen) doesn't toggle the panel twice on the way through.
let clickTimer = 0;
canvas.addEventListener("click", () => {
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    panel.classList.toggle("hidden");
    tip.classList.add("hidden");
  }, 250);
});

// Double-click anywhere to toggle fullscreen
canvas.addEventListener("dblclick", () => {
  clearTimeout(clickTimer);
  toggleFullscreen();
});

// Keep the panel inside the viewport when the window is resized. Registered here
// (not inside resize()) because `panel` is defined after the initial resize call.
window.addEventListener("resize", () => {
  if (panel.style.left) {
    positionPanel(parseFloat(panel.style.left), parseFloat(panel.style.top));
  }
});

loadSettings();
refreshColors(); // after loadSettings, which may have applied the light theme
refreshUI();
requestAnimationFrame(frame);
</script>
</body>
</html>
